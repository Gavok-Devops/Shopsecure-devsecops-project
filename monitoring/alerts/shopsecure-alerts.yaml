apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shopsecure-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:

    - name: shopsecure.availability
      interval: 30s
      rules:
        - alert: ServiceDown
          expr: up{namespace="shopsecure-prod"} == 0
          for: 2m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: "Service {{ $labels.job }} is down"
            description: "{{ $labels.instance }} has been unreachable for over 2 minutes."
            runbook: "https://wiki.shopsecure.io/runbooks/service-down"

        - alert: DeploymentReplicasMismatch
          expr: |
            kube_deployment_spec_replicas{namespace="shopsecure-prod"}
              !=
            kube_deployment_status_available_replicas{namespace="shopsecure-prod"}
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Deployment {{ $labels.deployment }} has replica mismatch"
            description: "Expected {{ $value }} replicas but fewer are available."

    - name: shopsecure.latency
      rules:
        - alert: HighP99Latency
          expr: |
            histogram_quantile(0.99,
              sum(rate(http_request_duration_seconds_bucket{namespace="shopsecure-prod"}[5m]))
              by (le, service)
            ) > 2.0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "P99 latency > 2s on {{ $labels.service }}"
            description: "P99 response time is {{ $value | humanizeDuration }} — SLO breach risk."

        - alert: HighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="shopsecure-prod", status=~"5.."}[5m]))
              /
            sum(rate(http_requests_total{namespace="shopsecure-prod"}[5m])) > 0.05
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Error rate above 5% for {{ $labels.service }}"
            description: "Current error rate: {{ $value | humanizePercentage }}"

    - name: shopsecure.pods
      rules:
        - alert: PodCrashLooping
          expr: |
            rate(kube_pod_container_status_restarts_total{namespace="shopsecure-prod"}[15m]) * 60 > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Container {{ $labels.container }} has restarted {{ $value }} times/min."

        - alert: PodOOMKilled
          expr: |
            kube_pod_container_status_last_terminated_reason{
              namespace="shopsecure-prod",
              reason="OOMKilled"
            } == 1
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} was OOMKilled"
            description: "Container {{ $labels.container }} exceeded memory limits."

    - name: shopsecure.infrastructure
      rules:
        - alert: NodeHighCPU
          expr: |
            100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.node }} CPU > 85%"

        - alert: NodeDiskPressure
          expr: |
            (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.instance }} disk < 15% free"
            description: "Only {{ $value | humanizePercentage }} disk space remaining."

        - alert: PersistentVolumeAlmostFull
          expr: |
            kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes < 0.10
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.persistentvolumeclaim }} almost full"
