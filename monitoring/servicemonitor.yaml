apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: shopsecure-services
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - shopsecure-prod
      - shopsecure-staging
  selector:
    matchLabels:
      monitoring: enabled
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
